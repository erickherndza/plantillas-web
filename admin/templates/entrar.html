<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión · Plantillas Web RD</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body class="login-body">

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <span class="logo-mark">PW</span>
        <div>
          <p class="logo-title">Accede a tu panel</p>
          <p class="logo-sub">Plantillas Web RD</p>
        </div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <a href="{{ url_for('auth_google') }}" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48" style="margin-right:8px;flex-shrink:0">
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.16C6.51 42.62 14.62 48 24 48z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.5-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.16C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.55 10.75l7.98-6.16z"/>
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.55 13.25l7.98 6.16C12.43 13.72 17.74 9.5 24 9.5z"/>
        </svg>
        Continuar con Google
      </a>

      <div class="login-divider"><span>o</span></div>

      <form method="POST" action="{{ url_for('entrar') }}" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required
                 autocomplete="email" placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required
                 autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-login">Entrar</button>
      </form>

      <p style="text-align:center;margin-top:12px;">
        <a href="{{ url_for('olvide_contrasena') }}"
           style="font-size:13px;color:var(--admin-text-muted);">¿Olvidaste tu contraseña?</a>
      </p>

      <p class="login-footer" style="margin-top:16px;">
        ¿No tienes cuenta?
        <a href="{{ url_for('registro') }}" style="color:var(--admin-accent);font-weight:600;">Regístrate gratis</a>
      </p>

    </div>
  </div>

</body>
</html>
