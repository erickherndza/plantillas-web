<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración · Plantillas Web RD</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body class="login-body">

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <span class="logo-mark">PW</span>
        <div>
          <p class="logo-title">Panel de administración</p>
          <p class="logo-sub">Plantillas Web RD</p>
        </div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}" class="login-form">
        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" required
                 autocomplete="username" placeholder="Ej: admin">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required
                 autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-login">Entrar</button>
      </form>

      <p style="text-align:center;margin-top:12px;">
        <a href="{{ url_for('login_recuperar') }}"
           style="font-size:13px;color:var(--admin-text-muted);">¿Olvidaste tu contraseña?</a>
      </p>
      <p class="login-footer">Sistema privado · Solo usuarios autorizados</p>
    </div>
  </div>

</body>
</html>
