<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña · Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-mark">PW</span>
        <div>
          <p class="logo-title">Nueva contraseña</p>
          <p class="logo-sub">Panel de administración</p>
        </div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" class="login-form">
        <div class="form-group">
          <label for="password">Nueva contraseña</label>
          <input type="password" id="password" name="password" required
                 autocomplete="new-password" placeholder="Mínimo 8 caracteres">
        </div>
        <div class="form-group">
          <label for="confirm">Confirmar contraseña</label>
          <input type="password" id="confirm" name="confirm" required
                 autocomplete="new-password" placeholder="Repite la contraseña">
        </div>
        <button type="submit" class="btn-login">Guardar contraseña</button>
      </form>
    </div>
  </div>
</body>
</html>
